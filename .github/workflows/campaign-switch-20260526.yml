name: "Campaign Switch: LINE 15%OFF → まとめ割 10%OFF"

on:
  schedule:
    # 2026-05-26 00:00 JST = 2026-05-25 15:00 UTC
    - cron: "0 15 25 5 *"
  workflow_dispatch: # Manual trigger for testing

jobs:
  switch-campaign:
    runs-on: ubuntu-latest
    # Only run in 2026 (cron can't specify year)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 15 25 5'))
    steps:
      - uses: actions/checkout@v4

      - name: Run campaign switch script
        run: python3 .github/scripts/switch-campaign-bundle-discount.py

      - name: Verify changes
        run: git diff --stat

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resize/index.html
          git commit -m "$(cat <<'EOF'
          Switch campaign: LINE開設記念15%OFF → まとめ割10%OFF

          - Hero promo band: まとめ割 / 2つ以上で10%OFF
          - Pricing grid: 10%OFF prices (¥9,900 / ¥13,500 / ¥22,500)
          - CTA, FAQ, meta tags updated
          - Automated via GitHub Actions scheduled workflow
          EOF
          )"
          git push
